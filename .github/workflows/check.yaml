name: Checks

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions: read-all

jobs:
  check:
    name: "Ubuntu - Run rust checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
      - name: Pull the accompany tools
        run: |
          git submodule update --init --recursive tools/emsdk
          git submodule update --init --depth=1 tools/dawn
          git submodule update --init --recursive infrastructure/llama-bindings/llama.cpp
      - name: Install native dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential curl \
                  libssl-dev libclang-dev pkg-config cmake git \
                  gcc clang mold
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Clippy
        run: cargo clippy
      - name: Fmt
        run: cargo fmt --check
      - name: Test (No Std)
        run: cargo test --workspace
      - name: Test (Std)
        run: cargo test --workspace --features multi
      - name: Test (LLamaCPP)
        run: cargo test --workspace --features infrastructure_llama_cpp/sampler --features multi
      - name: Dry-Run Publishing
        run: RUST_BACKTRACE=1 cargo publish --workspace --verbose --dry-run
  docker:
    name: "Docker - Build on various targets"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux/arm64, linux/amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
      - name: Checkout llama.cpp
        run: |
          git submodule update --init --recursive infrastructure/llama-bindings/llama.cpp
      - name: Prepare clean build context
        run: |
          mkdir -p /tmp/ewe-docker-build
          rsync -av --exclude='.git' --exclude='tools/dawn' --exclude='tools/emsdk' --exclude='.agents' --exclude='bin' . /tmp/ewe-docker-build/
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: /tmp/ewe-docker-build
          file: /tmp/ewe-docker-build/test-build.Dockerfile
          platforms: ${{ matrix.target }}
          push: false
          cache-from: type=gha
          cache-to: type=gha
          build-args: |
            CUDA_VERSION=12.3.1
            UBUNTU_VERSION=22.04
            TARGETPLATFORM=${{ matrix.target }}
  mac:
    name: "macOS - Run rust checks"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
      - name: Pull the accompany tools
        run: |
          git submodule update --init --recursive tools/emsdk
          git submodule update --init --depth=1 tools/dawn
          git submodule update --init --recursive infrastructure/llama-bindings/llama.cpp
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Build
        run: cargo build --workspace --features infrastructure_llama_cpp/sampler
