name: Checks

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow}}-${{github.ref}}
  cancel-in-progress: true

permissions: read-all

jobs:
  check:
    name: "Ubuntu - Run rust checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Pull the accompany tools
        run: |
          ./scripts/modules.sh
      - name: Install native dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential curl \
                  libssl-dev libclang-dev pkg-config cmake git \
                  gcc clang mold
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Clippy
        run: cargo clippy
      - name: Fmt
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace --features infrastructure_llama_cpp/sampler
      - name: Dry-Run Publishing
        run: RUST_BACKTRACE=1 cargo publish --workspace --verbose --dry-run
  docker:
    name: "Docker - Build on various targets"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [linux/arm64, linux/amd64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build
        uses: docker/build-push-action@v6
        with:
          file: test-build.Dockerfile
          platforms: ${{ matrix.target }}
          push: false
          build-args: |
            CUDA_VERSION=12.3.1
            UBUNTU_VERSION=22.04
  mac:
    name: "macOS - Run rust checks"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Pull the accompany tools
        run: |
          ./scripts/modules.sh
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Build
        run: cargo build --workspace
  windows:
    name: "Windows - Run rust checks"
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Pull the accompany tools
        run: |
          ./scripts/modules.sh
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace --features infrastructure_llama_cpp/sampler
