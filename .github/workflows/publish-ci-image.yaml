name: Publish CI Test Image

on:
  push:
    branches:
      - master
    paths:
      - ci-test.Dockerfile
      - .github/workflows/publish-ci-image.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push ewe-platform-ci image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ci-test.Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ewe-platform-ci:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ewe-platform-ci:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
