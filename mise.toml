# =============================================================================
# Tasks - Zed Editor
# =============================================================================

[tasks."zed:rust-analyzer"]
description = "Convert rust-analyzer.toml to .zed/settings.json"
run = """
echo "Converting rust-analyzer.toml to Zed format..."
python3 scripts/convert-rust-analyzer-config.py
"""
