echo "  test:integration   Run only integration tests"
echo "  test:quick         Quick smoke test"
echo "  test:nostd         All foundation_nostd tests"
echo "  test:wasm          WASM compilation tests"
echo ""
echo "Benchmarking:"
echo "  bench              Run all benchmarks"
echo "  bench:condvar      Run CondVar benchmarks only"
echo ""
echo "Quality:"
echo "  quality            Run fmt-check + clippy + unit tests"
