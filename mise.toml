[tasks."build:test-directory"]
description = "Build a single WASM test directory"
run = """
#!/usr/bin/env bash
TEST_DIRECTORY="${TEST_DIRECTORY:-./tests/integrations/tests_callfunction}"
TEST_PACKAGE="${TEST_PACKAGE:-$(basename "$TEST_DIRECTORY")}"

RUSTFLAGS='-C link-arg=-s' cargo build --package "$TEST_PACKAGE" --target wasm32-unknown-unknown
cp "./target/wasm32-unknown-unknown/debug/${TEST_PACKAGE}.d" "${TEST_DIRECTORY}/module.d"
cp "./target/wasm32-unknown-unknown/debug/${TEST_PACKAGE}.wasm" "${TEST_DIRECTORY}/module.wasm"
cp ./assets/jsruntime/megatron.js "${TEST_DIRECTORY}/megatron.js"
wasm2wat "${TEST_DIRECTORY}/module.wasm" -o "${TEST_DIRECTORY}/module.wat"
"""

[tasks."build:tests"]
alias = "build-tests"
description = "Build all WASM integration test packages"
run = """
#!/usr/bin/env bash
for dir in ./tests/integrations/*/; do
    pkg=$(basename "$dir")
    echo "Building test package: $pkg"
    TEST_DIRECTORY="$dir" TEST_PACKAGE="$pkg" mise run build:test-directory
done
"""

[tasks."build:target-test"]
alias = "build-target-test"
description = "Build a specific WASM test target"
run = """
#!/usr/bin/env bash
TARGET_TEST="${TARGET_TEST:-tests_callfunction}"
mise run build:test-directory TEST_DIRECTORY="./tests/integrations/${TARGET_TEST}" TEST_PACKAGE="${TARGET_TEST}"
"""

[tasks.clean]
description = "Clean all build artifacts"
run = """
echo "Cleaning build artifacts..."
cargo clean
echo "✓ Clean complete"
