[tasks."cf:start"]
description = "Start wrangler dev for local testing (background)"
run = """
#!/usr/bin/env bash
set -e

# Kill any existing wrangler/workerd processes (workerd is the actual
# process holding the dev-server port, and pkill -f "wrangler" misses it).
pkill -f "wrangler" 2>/dev/null || true
pkill -f "workerd" 2>/dev/null || true
sleep 1

echo "Starting wrangler dev for local testing..."

# Use project root wrangler.toml
cd "$PROJECT_ROOT"

# Start wrangler dev in background with --local flag
wrangler dev --local > "$PROJECT_ROOT/wrangler.log" 2>&1 &
WRANGLER_PID=$!
echo $WRANGLER_PID > /tmp/wrangler-test.pid

# Wait for wrangler to be ready
echo "Waiting for wrangler to start..."
for i in {1..30}; do
    STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8789 2>/dev/null || echo "000")
    if [ "$STATUS" = "200" ] || [ "$STATUS" = "404" ]; then
        echo "Wrangler is ready (PID: $WRANGLER_PID)!"
        exit 0
    fi
    sleep 1
done

echo "ERROR: Wrangler failed to start. Check wrangler.log"
cat "$PROJECT_ROOT/wrangler.log"
exit 1
"""

[tasks."cf:stop"]
description = "Stop wrangler background process"
run = """
#!/usr/bin/env bash
if [ -f /tmp/wrangler-test.pid ]; then
    PID=$(cat /tmp/wrangler-test.pid)
    if kill -0 $PID 2>/dev/null; then
        echo "Stopping wrangler (PID: $PID)..."
        kill $PID
        echo "Wrangler stopped"
    fi
    rm /tmp/wrangler-test.pid
fi
pkill -f "wrangler" 2>/dev/null || true
pkill -f "workerd" 2>/dev/null || true
echo "Wrangler cleanup complete"
"""

[tasks."test:cf"]
description = "Run all Cloudflare integration tests (auto-starts wrangler)"
run = """
#!/usr/bin/env bash
set -e

echo "=== Cloudflare Integration Tests ==="
echo ""

# Start wrangler
mise run cf:start

# Ensure cleanup on exit
trap 'mise run cf:stop' EXIT

# Run R2 tests
echo ""
echo "=== Running R2 Tests ==="
export CF_INTEGRATION_TEST=1
export LOCAL_CF_API_BASE="http://localhost:8789"
export LOCAL_R2_BUCKET="test-bucket"
cargo test --package foundation_db --test r2_blobstore_tests -- --show-output

# Run D1 tests
echo ""
echo "=== Running D1 Tests ==="
export LOCAL_D1_DATABASE_ID="test-db"
cargo test --package foundation_db --test d1_kvstore_tests -- --show-output

echo ""
echo "✓ All Cloudflare tests passed"
"""

