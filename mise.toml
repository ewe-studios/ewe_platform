# =============================================================================
# EWE Platform - mise configuration
# =============================================================================
# Replaces: root Makefile, assets/public/Makefile, examples/todo/Makefile,
#           backends/foundation_nostd/Makefile
#
# Usage:
#   mise install          Install all tools
#   mise run <task>       Run a task
#   mise tasks            List all available tasks
# =============================================================================

[env]
CARGO_TERM_COLOR = "always"
PROJECT_ROOT = "{{config_root}}"
_.path = ["./node_modules/.bin", "./tools/depot_tools"]

# =============================================================================
# Tool versions - mise manages these automatically
# =============================================================================
# NOTE: Rust toolchain is managed by rust-toolchain.toml (rustup).
# mise defers to rust-toolchain.toml when present, so we don't duplicate it.

[tools]
node = "23"
pnpm = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-audit" = "latest"
"cargo:bacon" = "latest"
# wrangler is managed via project devDependencies (pnpm), not mise —
# mise's npm shim installs wrangler into a nested tree where sharp's
# prebuilt-binary check fails and falls back to a node-gyp build.

# =============================================================================
# Tasks - Setup
# =============================================================================

[tasks.setup]
description = "Install all dev tools and WASM targets"
depends = ["setup:tools", "setup:wasm", "setup:cloudflare"]
run = 'echo "✓ Development environment setup complete"'

[tasks."setup:tools"]
description = "Install rustfmt, clippy, rust-analyzer, cargo-nextest, cargo-audit"
run = """
echo "Installing development tools..."
rustup component add rustfmt clippy rust-analyzer 2>/dev/null || true
echo "Installing pnmp tools..."
pnpm install
echo "✓ Tools installed (cargo-nextest and cargo-audit managed by mise)"
"""

[tasks."setup:wasm"]
description = "Install WASM compilation targets"
run = """
echo "Installing WASM targets..."
rustup target add wasm32-unknown-unknown
rustup target add wasm32-wasip1
echo "✓ WASM targets installed"
"""

[tasks."setup:depot-tools"]
description = "Install Chromium depot_tools into tools/depot_tools (for Dawn/gclient)"
run = """
#!/usr/bin/env bash
set -e
DEPOT_DIR="$PROJECT_ROOT/tools/depot_tools"
if [ -d "$DEPOT_DIR/.git" ]; then
    echo "depot_tools already present, updating..."
    git -C "$DEPOT_DIR" pull --ff-only
else
    echo "Cloning depot_tools into $DEPOT_DIR..."
    mkdir -p "$PROJECT_ROOT/tools"
    git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git "$DEPOT_DIR"
fi
echo "✓ depot_tools installed. Ensure tools/depot_tools is on PATH (mise handles this)."
"""

[tasks."tools:dawn:clone"]
description = "Clone Dawn into tools/dawn and run gclient sync (requires depot_tools)"
depends = ["setup:depot-tools"]
run = """
#!/usr/bin/env bash
set -e
DAWN_DIR="$PROJECT_ROOT/tools/dawn"
if [ -d "$DAWN_DIR/.git" ]; then
    echo "Dawn already cloned at $DAWN_DIR"
else
    echo "Cloning Dawn into $DAWN_DIR..."
    mkdir -p "$PROJECT_ROOT/tools"
    git clone https://dawn.googlesource.com/dawn "$DAWN_DIR"
fi

cd "$DAWN_DIR"
if [ ! -f .gclient ]; then
    echo "Bootstrapping gclient config from scripts/standalone.gclient..."
    cp scripts/standalone.gclient .gclient
fi

echo "Running gclient sync..."
gclient sync
echo "✓ Dawn cloned and synced at $DAWN_DIR"
"""

[tasks."setup:cloudflare"]
description = "Install Cloudflare tools (wrangler via mise)"
depends = ["install:cloudflare"]
run = """
echo "✓ Cloudflare tools installed"
echo ""
echo "Usage:"
echo "  mise run cf:start   - Start local wrangler dev"
echo "  mise run test:cf    - Run R2/D1 integration tests"
"""

[tasks."install:cloudflare"]
description = "Install wrangler (Cloudflare CLI) via pnpm"
run = """
pnpm install
"""

[tasks."setup:check"]
alias = "check-tools"
description = "Verify all installed tools and versions"
run = """
echo "Checking installed tools..."
rustup --version
cargo --version
node --version
rustup target list --installed | grep wasm32 || echo "⚠ No WASM targets installed"
cargo nextest --version 2>/dev/null || echo "⚠ cargo-nextest not installed"
cargo audit --version 2>/dev/null || echo "⚠ cargo-audit not installed"
bacon --version 2>/dev/null || echo "⚠ bacon not installed"
echo "✓ Tool check complete"
"""

# =============================================================================
# Tasks - Git / Submodules
# =============================================================================

[tasks."git:update-submodules"]
alias = "update-submodules"
description = "Update all git submodules to latest remote"
run = """
